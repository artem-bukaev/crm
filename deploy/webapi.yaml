apiVersion: apps/v1
kind: Deployment
metadata:
  name: crm-webapi
  namespace: crm
  labels:
    app.kubernetes.io/name: crm
    app.kubernetes.io/component: webapi
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: crm
      app.kubernetes.io/component: webapi
  template:
    metadata:
      labels:
        app.kubernetes.io/name: crm
        app.kubernetes.io/component: webapi
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654
        runAsGroup: 1654
        fsGroup: 1654
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: webapi
          image: cr.yandex/registry-id/crm-webapi:replace-me
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: ASPNETCORE_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: crm-config
                  key: ASPNETCORE_ENVIRONMENT
            - name: DOTNET_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: crm-config
                  key: DOTNET_ENVIRONMENT
            - name: ASPNETCORE_FORWARDEDHEADERS_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: crm-config
                  key: ASPNETCORE_FORWARDEDHEADERS_ENABLED
            - name: DOTNET_EnableDiagnostics
              valueFrom:
                configMapKeyRef:
                  name: crm-config
                  key: DOTNET_EnableDiagnostics
            - name: ConnectionStrings__CrmDb
              valueFrom:
                secretKeyRef:
                  name: crm-secrets
                  key: ConnectionStrings__CrmDb
            - name: Auth__Jwt__SigningKey
              valueFrom:
                secretKeyRef:
                  name: crm-secrets
                  key: Auth__Jwt__SigningKey
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /health/ready
              port: http
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: crm-webapi
  namespace: crm
  labels:
    app.kubernetes.io/name: crm
    app.kubernetes.io/component: webapi
  annotations:
    ingress.alb.yc.io/protocol: http
    ingress.alb.yc.io/health-checks: port=30081,http-path=/health/ready,timeout=3s,interval=10s,healthy-threshold=2,unhealthy-threshold=3
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: crm
    app.kubernetes.io/component: webapi
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: http
      nodePort: 30081
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: crm-webapi
  namespace: crm
  labels:
    app.kubernetes.io/name: crm
    app.kubernetes.io/component: webapi
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: crm
      app.kubernetes.io/component: webapi

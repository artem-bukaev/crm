apiVersion: apps/v1
kind: Deployment
metadata:
  name: crm-webapp
  namespace: crm
  labels:
    app.kubernetes.io/name: crm
    app.kubernetes.io/component: webapp
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: crm
      app.kubernetes.io/component: webapp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: crm
        app.kubernetes.io/component: webapp
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: webapp
          image: cr.yandex/registry-id/crm-webapp:replace-me
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: NGINX_ENTRYPOINT_QUIET_LOGS
              valueFrom:
                configMapKeyRef:
                  name: crm-config
                  key: NGINX_ENTRYPOINT_QUIET_LOGS
            - name: WEB_API_PUBLIC_PATH
              valueFrom:
                configMapKeyRef:
                  name: crm-config
                  key: WEB_API_PUBLIC_PATH
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: crm-webapp
  namespace: crm
  labels:
    app.kubernetes.io/name: crm
    app.kubernetes.io/component: webapp
  annotations:
    ingress.alb.yc.io/protocol: http
    ingress.alb.yc.io/health-checks: port=30080,http-path=/healthz,timeout=3s,interval=10s,healthy-threshold=2,unhealthy-threshold=3
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: crm
    app.kubernetes.io/component: webapp
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
      nodePort: 30080
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: crm-webapp
  namespace: crm
  labels:
    app.kubernetes.io/name: crm
    app.kubernetes.io/component: webapp
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: crm
      app.kubernetes.io/component: webapp
